<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 同声传译助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部工具栏 -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="title" id="sessionTitle">2026年06月06日_记录</span>
                <span class="tag tag-green"><i class="ri-shield-check-line"></i> 会议记录自动保存</span>
                <span class="tag tag-green"><i class="ri-shield-check-line"></i> 数据安全保护</span>
                <span class="tag tag-gray">翻译内容由AI生成</span>
            </div>
            <div class="topbar-right">
                <span class="user-icon"><i class="ri-user-smile-line"></i></span>
                <span class="window-ctrl"><i class="ri-subtract-line"></i></span>
                <span class="window-ctrl"><i class="ri-fullscreen-line"></i></span>
                <span class="window-ctrl close"><i class="ri-close-line"></i></span>
            </div>
        </header>

        <!-- 控制栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="dropdown" id="modelDropdown">
                    <i class="ri-settings-3-line"></i>
                    <span>通用模型</span>
                    <i class="ri-arrow-down-s-line"></i>
                </div>
                <div class="lang-switch" id="langSwitch">
                    <select id="sourceLangSelect">
                        <option value="en">英语</option>
                        <option value="zh">中文</option>
                        <option value="ja">日语</option>
                        <option value="ko">韩语</option>
                        <option value="fr">法语</option>
                        <option value="de">德语</option>
                        <option value="es">西班牙语</option>
                        <option value="pt">葡萄牙语</option>
                        <option value="ru">俄语</option>
                        <option value="ar">阿拉伯语</option>
                        <option value="it">意大利语</option>
                        <option value="id">印尼语</option>
                        <option value="vi">越南语</option>
                        <option value="th">泰语</option>
                        <option value="tr">土耳其语</option>
                        <option value="hi">印地语</option>
                        <option value="ms">马来语</option>
                        <option value="nl">荷兰语</option>
                        <option value="ur">乌尔都语</option>
                        <option value="nb">挪威语</option>
                        <option value="sv">瑞典语</option>
                        <option value="da">丹麦语</option>
                        <option value="he">希伯来语</option>
                        <option value="fi">芬兰语</option>
                        <option value="pl">波兰语</option>
                        <option value="is">冰岛语</option>
                        <option value="cs">捷克语</option>
                        <option value="fil">菲律宾语</option>
                        <option value="fa">波斯语</option>
                        <option value="yue">粤语</option>
                        <option value="el">希腊语</option>
                        <option value="af">南非荷兰语</option>
                        <option value="ast">阿斯图里亚斯语</option>
                        <option value="be">白俄罗斯语</option>
                        <option value="bg">保加利亚语</option>
                        <option value="bn">孟加拉语</option>
                        <option value="bs">波斯尼亚语</option>
                        <option value="ca">加泰罗尼亚语</option>
                        <option value="ceb">宿务语</option>
                        <option value="et">爱沙尼亚语</option>
                        <option value="gl">加利西亚语</option>
                        <option value="gu">古吉拉特语</option>
                        <option value="hr">克罗地亚语</option>
                        <option value="hu">匈牙利语</option>
                        <option value="jv">爪哇语</option>
                        <option value="kk">哈萨克语</option>

                        <option value="ky">柯尔克孜语</option>
                        <option value="lv">拉脱维亚语</option>
                        <option value="mk">马其顿语</option>
                        <option value="ml">马拉雅拉姆语</option>
                        <option value="mr">马拉地语</option>
                        <option value="pa">旁遮普语</option>
                        <option value="ro">罗马尼亚语</option>

                        <option value="uk">乌克兰语</option>
                    </select>
                    <i class="ri-arrow-right-line"></i>
                    <select id="targetLangSelect">
                        <option value="zh" selected>中文</option>
                        <option value="en">英语</option>
                        <option value="ja">日语</option>
                        <option value="ko">韩语</option>
                        <option value="fr">法语</option>
                        <option value="de">德语</option>
                        <option value="es">西班牙语</option>
                        <option value="pt">葡萄牙语</option>
                        <option value="ru">俄语</option>
                        <option value="ar">阿拉伯语</option>
                        <option value="it">意大利语</option>
                        <option value="id">印尼语</option>
                        <option value="vi">越南语</option>
                        <option value="th">泰语</option>
                        <option value="tr">土耳其语</option>
                        <option value="hi">印地语</option>
                        <option value="ms">马来语</option>
                        <option value="nl">荷兰语</option>
                        <option value="ur">乌尔都语</option>
                        <option value="nb">挪威语</option>
                        <option value="sv">瑞典语</option>
                        <option value="da">丹麦语</option>
                        <option value="he">希伯来语</option>
                        <option value="fi">芬兰语</option>
                        <option value="pl">波兰语</option>
                        <option value="is">冰岛语</option>
                        <option value="cs">捷克语</option>
                        <option value="fil">菲律宾语</option>
                        <option value="fa">波斯语</option>
                        <option value="yue">粤语</option>
                        <option value="el">希腊语</option>
                        <option value="af">南非荷兰语</option>
                        <option value="ast">阿斯图里亚斯语</option>
                        <option value="be">白俄罗斯语</option>
                        <option value="bg">保加利亚语</option>
                        <option value="bn">孟加拉语</option>
                        <option value="bs">波斯尼亚语</option>
                        <option value="ca">加泰罗尼亚语</option>
                        <option value="ceb">宿务语</option>
                        <option value="et">爱沙尼亚语</option>
                        <option value="gl">加利西亚语</option>
                        <option value="gu">古吉拉特语</option>
                        <option value="hr">克罗地亚语</option>
                        <option value="hu">匈牙利语</option>
                        <option value="jv">爪哇语</option>
                        <option value="kk">哈萨克语</option>
                        <option value="kn">卡纳达语</option>
                        <option value="ky">柯尔克孜语</option>
                        <option value="lv">拉脱维亚语</option>
                        <option value="mk">马其顿语</option>
                        <option value="ml">马拉雅拉姆语</option>
                        <option value="mr">马拉地语</option>
                        <option value="pa">旁遮普语</option>
                        <option value="ro">罗马尼亚语</option>
                        <option value="sk">斯洛伐克语</option>
                        <option value="sl">斯洛文尼亚语</option>
                        <option value="sw">斯瓦希里语</option>
                        <option value="tg">塔吉克语</option>
                        <option value="az">阿塞拜疆语</option>
                        <option value="uk">乌克兰语</option>
                    </select>
                </div>
            </div>
            <div class="toolbar-center">
                <button class="btn-chip active" id="effectBtn">
                    <i class="ri-magic-line"></i> 效果优化
                </button>
                <button class="btn-chip" id="shareBtn">
                    <i class="ri-share-box-line"></i> 分享字幕
                </button>
                <button class="btn-chip" id="audioTestBtn">
                    <i class="ri-mic-line"></i> 麦克风测试
                </button>
                <button class="btn-chip" id="castBtn">
                    <i class="ri-tv-line"></i> 字幕投屏
                </button>
            </div>
        </div>

        <!-- 音频测试面板（默认隐藏） -->
        <div class="audio-test-panel" id="audioTestPanel">
            <div class="audio-test-header">
                <span>麦克风输入测试</span>
                <button class="audio-test-close" id="audioTestClose">&times;</button>
            </div>
            <div class="audio-test-body">
                <button class="audio-test-start" id="audioTestStartBtn">
                    <i class="ri-mic-line"></i> 开始测试
                </button>
                <button class="audio-test-stop" id="audioTestStopBtn" disabled>
                    <i class="ri-stop-circle-line"></i> 停止
                </button>
                <div class="volume-meter" id="volumeMeter">
                    <span class="volume-label">音量检测</span>
                    <div class="volume-bars" id="volumeBars"></div>
                </div>
                <div class="audio-test-status" id="audioTestStatus">点击开始测试麦克风</div>
            </div>
        </div>

        <!-- 主体区域 -->
        <div class="main">
            <!-- 左侧：翻译显示区 -->
            <div class="translate-area">
                <div class="translate-header">
                    <div class="dropdown" id="viewModeDropdown">
                        <span id="viewModeLabel">双语</span>
                        <i class="ri-arrow-down-s-line"></i>
                        <div class="dropdown-menu" id="viewModeMenu">
                            <div class="dropdown-item active" data-mode="bilingual">双语</div>
                            <div class="dropdown-item" data-mode="source">原文</div>
                            <div class="dropdown-item" data-mode="target">译文</div>
                        </div>
                    </div>
                    <div class="view-mode">
                        <span>分区对照</span>
                        <i class="ri-arrow-down-s-line"></i>
                    </div>
                    <div class="font-ctrl">
                        <button class="font-btn" id="increaseFontBtn">A<sup>+</sup></button>
                        <button class="font-btn" id="decreaseFontBtn">A<sup>-</sup></button>
                    </div>
                </div>

                <!-- 双语对照内容区 -->
                <div class="bilingual-content" id="bilingualContent">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">
                            <i class="ri-translate-2"></i>
                        </div>
                        <button class="start-btn" id="startBtn">
                            <i class="ri-mic-line"></i> 开始同传
                        </button>
                        <div class="audio-source">
                            <span>混合声源</span>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                    </div>

                    <!-- 原文区域 -->
                    <div class="source-area" id="sourceArea">
                        <div class="source-text" id="sourceText"></div>
                    </div>

                    <!-- 译文区域 -->
                    <div class="target-area" id="targetArea">
                        <div class="target-text" id="targetText"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：同传笔记 -->
            <div class="notes-area">
                <div class="notes-header">
                    <h3>同传笔记</h3>
                    <button class="notes-action"><i class="ri-font-size"></i></button>
                </div>
                <textarea class="notes-textarea" placeholder="从这里输入，记录此刻同传翻译想法"></textarea>
            </div>
        </div>

        <!-- 底部浮动控制条（录音时显示） -->
        <div class="floating-controls" id="floatingControls">
            <button class="fc-btn fc-pause" id="fcPauseBtn">
                <i class="ri-pause-fill"></i>
            </button>
            <span class="fc-timer" id="fcTimer">00:00:00</span>
            <div class="fc-volume-bars" id="fcVolumeBars"></div>
            <div class="fc-source">
                <span>混合声源</span>
                <i class="ri-arrow-down-s-line"></i>
            </div>
            <button class="fc-btn fc-stop" id="fcStopBtn">
                <i class="ri-stop-fill"></i>
            </button>
        </div>

        <!-- 底部状态栏 -->
        <footer class="bottombar">
            <span id="statusText">就绪</span>
            <span id="audioLevel"><i class="ri-mic-line"></i> --</span>
            <span id="connectionStatus"><i class="ri-wifi-off-line"></i> 未连接</span>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
